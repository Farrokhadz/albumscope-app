<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <title>Playhead — Welcome</title>
  </head>
  <body class="auth-body">
    <div class="phone">
      <div class="hero">
        <img
          class="hero-img"
          src="https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?q=80&w=1000&auto=format&fit=crop"
          alt="vinyl record and headphones"
        />
        <div class="hero-tint"></div>
        <div class="hero-fade"></div>

        <div class="hero-text">
          <p>
            <strong>Swipe up</strong> to discover<br />
            your next favorite<br />
            album.
          </p>
        </div>

        <div class="swipe-hint">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </div>
      </div>

      <div class="sheet-peek"></div>
    </div>
  </body>
</html>
