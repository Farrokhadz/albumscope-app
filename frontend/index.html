<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Playhead</title>
  </head>
  <script src="js/pages/search.js" defer></script>
  <script src="js/pages/library.js" defer></script>
  <script src="js/pages/profile.js" defer></script>
  <script src="js/router.js" defer></script>
  <body>
    <div class="page">
      <header>
        <img
          width="100"
          height="100"
          src="https://img.icons8.com/ios/100/unabridged-edition.png"
          alt="unabridged-edition"
        />
        <h1>Playhead</h1>
      </header>

      <main id="app"></main>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item active" aria-label="Search" data-link href="/">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search</span>
      </button>
      <button class="nav-item" aria-label="Library" data-link href="/library">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Library</span>
      </button>
      <button class="nav-item" aria-label="Profile" data-link href="/profile">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
        <span>Profile</span>
      </button>
    </nav>
  </body>
</html>
