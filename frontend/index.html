<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Playhead</title>
  </head>
  <script src="script.js" defer></script>
  <body>
    <div class="page">
      <header>
        <img
          width="100"
          height="100"
          src="https://img.icons8.com/ios/100/unabridged-edition.png"
          alt="unabridged-edition"
        />
        <h1>Playhead</h1>
      </header>
      <main>
        <form class="Search">
          <input placeholder="Enter the name of singer" id="input" />
          <button type="submit" aria-label="Search">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              x="0px"
              y="0px"
              width="50"
              height="50"
              viewBox="0 0 50 50"
            >
              <path
                d="M 21 4 C 11.082241 4 3 12.082241 3 22 C 3 31.917759 11.082241 40 21 40 C 24.62177 40 27.99231 38.91393 30.820312 37.0625 L 43.378906 49.621094 L 47.621094 45.378906 L 35.224609 32.982422 C 37.581469 29.938384 39 26.13473 39 22 C 39 12.082241 30.917759 4 21 4 z M 21 8 C 28.756241 8 35 14.243759 35 22 C 35 29.756241 28.756241 36 21 36 C 13.243759 36 7 29.756241 7 22 C 7 14.243759 13.243759 8 21 8 z"
              ></path>
            </svg>
          </button>
        </form>

        <div class="album-card">
          <div class="card-profile">
            <img
              width="64"
              height="64"
              src="image/defultalbum-card.png"
              alt="external-artist-media-anggara-outline-color-anggara-putra"
            />
          </div>
          <div class="card-tint"></div>
          <div class="card-overlay"></div>
          <div class="card-info">
            <h2 class="singer-name">singer name</h2>
            <p class="album-length">this is a test for singer name</p>
          </div>
        </div>

        <h2 class="section-title">Albums</h2>
        <ul class="album-list">
          <li>
            <img />
            <h2>album name</h2>
            <p>2026</p>
          </li>
        </ul>
      </main>
    </div>
    <nav class="bottom-nav">
      <button class="nav-item active" aria-label="Search">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search</span>
      </button>
      <button class="nav-item" aria-label="Library">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Library</span>
      </button>
      <a href="login.html" class="nav-item" aria-label="Profile">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
        <span>Profile</span>
      </a>
    </nav>
  </body>
</html>
